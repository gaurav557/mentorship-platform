<!DOCTYPE html>
<html>
<head>
<title>Register - MentorHub</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  height:100vh;
}
.left{
  flex:1;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
}
.left h1{
  font-size:40px;
  margin-bottom:10px;
}
.left p{
  opacity:0.8;
  text-align:center;
  max-width:300px;
}
.right{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}
.container{
  width:350px;
  padding:30px;
  border-radius:15px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  color:white;
  text-align:center;
}
h2{
  margin-bottom:15px;
}
input, select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  outline:none;
}
.pass-box{
  position:relative;
}
.pass-box span{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:black;
}
button{
  width:100%;
  padding:12px;
  background:#ff7a18;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}
button:hover{
  background:#ffb347;
  transform:scale(1.05);
}
a{
  color:#ffd369;
  text-decoration:none;
}
@media(max-width:800px){
  body{
    flex-direction:column;
  }
}
</style>

</head>

<body>
<div class="left">
  <h1>MentorHub</h1>
  <p>
    Join the platform where learning meets real-world challenges.
    Grow faster with mentors and track your progress.
  </p>
</div>

<div class="right">
<div class="container">
  <h2>Create Account</h2>

  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">

  <div class="pass-box">
    <input type="password" id="password" placeholder="Password">
    <span onclick="togglePass()"></span>
  </div>

  <select id="role">
    <option value="mentor">Mentor</option>
    <option value="mentee">Student</option>
  </select>

  <button onclick="register()" id="btn">Register</button>

  <p style="margin-top:10px;">
    Already have account? <a href="index.html">Login</a>
  </p>
</div>
</div>

<script src="storage.js"></script>
<script>
function togglePass(){
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

function register(){
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const role = document.getElementById("role").value;
  const btn = document.getElementById("btn");

  if(!name || !email || !password){
    alert("Please fill all fields");
    return;
  }

  if(password.length < 4){
    alert("Password must be at least 4 characters");
    return;
  }

  btn.innerText = "Registering...";

  try{
    MentorStorage.registerUser({ name, email, password, role });
    alert("Registration successful");
    window.location.href = "index.html";
  }catch(error){
    alert(error.message || "Error");
    btn.innerText = "Register";
  }
}
</script>

</body>
</html>
