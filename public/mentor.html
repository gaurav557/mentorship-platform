<!DOCTYPE html>
<html>
<head>
<title>Mentor Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#1e1b4b,#312e81);
  color:white;
}
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#0f172a;
}
nav h2{
  margin:0;
}
nav button{
  background:#ff758c;
  border:none;
  padding:8px 15px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
.container{
  padding:20px;
}
.stats{
  display:flex;
  gap:20px;
}
.stat{
  flex:1;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  padding:15px;
  border-radius:12px;
  color:black;
  text-align:center;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}
.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-5px);
}
.chart-box{
  height:200px;
}
canvas{
  max-height:200px;
}
.form-group{
  margin-bottom:15px;
}
input, textarea, select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:5px;
}
.create-btn{
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,#ff7eb3,#ff758c);
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.item{
  background:#334155;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}
.leader{
  background:#22c55e;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  color:black;
}
.challenge-card{
  background:linear-gradient(135deg,#334155,#1e293b);
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}
.challenge-card h4{
  margin:0 0 5px;
}
.challenge-card p{
  font-size:13px;
  color:#cbd5f5;
}
.meta{
  display:flex;
  gap:15px;
  font-size:12px;
  margin-top:8px;
  color:#94a3b8;
  flex-wrap:wrap;
}
.submission-card{
  background:linear-gradient(135deg,#334155,#1e293b);
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}
.submission-card textarea{
  width:100%;
  margin-top:10px;
  padding:8px;
  border-radius:8px;
  border:none;
}
.submission-card button{
  margin-top:10px;
  background:#22c55e;
  border:none;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}
.green{ color:#22c55e; }
.orange{ color:#f59e0b; }
.stars{
  margin-top:10px;
}
.star{
  font-size:22px;
  cursor:pointer;
  opacity:0.4;
  transition:0.2s;
}
.star.active{
  opacity:1;
}
</style>
</head>

<body>
<nav>
  <h2>Mentor Dashboard</h2>
  <button onclick="logout()">Logout</button>
</nav>

<div class="container">
  <div class="stats">
    <div class="stat">
      <h3>Total Challenges</h3>
      <p id="totalC">0</p>
    </div>
    <div class="stat">
      <h3>Total Submissions</h3>
      <p id="totalS">0</p>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Create Session</h3>
      <input id="sessionTitle" placeholder="Session Title (Week 1)">
      <textarea id="sessionDesc" placeholder="Session Description"></textarea>
      <button class="create-btn" onclick="createSession()">Create Session</button>
      <div id="sessions" style="margin-top:10px;"></div>
    </div>

    <div class="card">
      <h3>Progress</h3>
      <div class="chart-box"><canvas id="myChart"></canvas></div>
    </div>
  </div>

  <div class="card" style="margin-top:20px;">
    <h3>Trends</h3>
    <div class="chart-box"><canvas id="lineChart"></canvas></div>
  </div>

  <div class="card" style="margin-top:20px;">
    <h3>Performance</h3>
    <div class="chart-box"><canvas id="barChart"></canvas></div>
  </div>

  <div class="card" style="margin-top:20px;">
    <h3>Leaderboard</h3>
    <div id="leaderboard">Loading...</div>
  </div>

  <div class="card" style="margin-top:20px;">
    <h3>Create Challenge</h3>

    <div class="form-group">
      <label>Title</label>
      <input id="title" placeholder="Enter challenge title">
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea id="desc" placeholder="Explain the challenge clearly"></textarea>
    </div>

    <div class="form-group">
      <label>Subject</label>
      <input id="subject" placeholder="e.g. JavaScript, DSA">
    </div>

    <div class="form-group">
      <label>Difficulty</label>
      <select id="difficulty">
        <option value="">Select</option>
        <option>Easy</option>
        <option>Medium</option>
        <option>Hard</option>
      </select>
    </div>

    <div class="form-group">
      <label>Session</label>
      <select id="sessionSelect"></select>
    </div>

    <div class="form-group">
      <label>Deadline</label>
      <input type="date" id="deadline">
    </div>

    <button class="create-btn" onclick="createChallenge()">Create</button>
  </div>

  <div class="card" style="margin-top:20px;">
    <h3>Challenges</h3>
    <div id="list">Loading...</div>
  </div>

  <div class="card" style="margin-top:20px;">
    <h3>Submissions</h3>
    <div id="submissions">Loading...</div>
  </div>
</div>

<script src="storage.js"></script>
<script>
const userData = JSON.parse(localStorage.getItem("user"));
if(!userData || userData.user.role !== "mentor"){
  window.location.href="index.html";
}

let chart, lineChart, barChart;
const ratings = {};

function loadSessions() {
  const data = MentorStorage.getSessions();
  let options = '<option value="">Select Session</option>';
  let cards = "";

  data.forEach((session) => {
    options += `<option value="${session.id}">${session.title}</option>`;
    cards += `
      <div class="item">
        <b>${session.title}</b>
        <p>${session.description || "No description"}</p>
      </div>
    `;
  });

  document.getElementById("sessionSelect").innerHTML = options;
  document.getElementById("sessions").innerHTML = cards || "<p>No sessions yet</p>";
}

function createSession(){
  const title = document.getElementById("sessionTitle").value.trim();
  const description = document.getElementById("sessionDesc").value.trim();

  if(!title){
    alert("Session title is required");
    return;
  }

  MentorStorage.addSession({ title, description });
  alert("Session created");
  document.getElementById("sessionTitle").value = "";
  document.getElementById("sessionDesc").value = "";
  loadSessions();
}

function loadChallenges(){
  const data = MentorStorage.getChallenges();
  totalC.innerText = data.length;

  if(!data.length){
    list.innerHTML = "<p>No challenges yet</p>";
    return;
  }

  list.innerHTML = data.map((challenge) => `
    <div class="challenge-card">
      <h4>${challenge.title}</h4>
      <p>${challenge.description}</p>
      <div class="meta">
        <span>Session: ${challenge.session_title || "No Session"}</span>
        <span>Subject: ${challenge.subject || "-"}</span>
        <span>Difficulty: ${challenge.difficulty || "-"}</span>
        <span>Deadline: ${challenge.deadline || "-"}</span>
      </div>
    </div>
  `).join("");
}

function loadSubmissions(){
  const data = MentorStorage.getSubmissionsWithFeedback();
  totalS.innerText = data.length;

  loadChart(data);
  loadLine(data);
  loadBar(data);

  if(!data.length){
    submissions.innerHTML = "<p>No submissions yet</p>";
    return;
  }

  submissions.innerHTML = data.map((submission) => `
    <div class="submission-card">
      <p><b>Challenge ID:</b> ${submission.challenge_id}</p>
      <p><b>Answer:</b> ${submission.answer}</p>
      <p>
        <b>Status:</b>
        <span class="${submission.status === "reviewed" ? "green" : "orange"}">
          ${submission.status || "pending"}
        </span>
      </p>
      <textarea id="fb${submission.id}" placeholder="Write feedback...">${submission.comment || ""}</textarea>
      <div class="stars">
        ${[1,2,3,4,5].map((n) => `
          <span
            onclick="setRating(${submission.id}, ${n})"
            class="star ${(submission.score && submission.score >= n) ? "active" : ""}"
            id="star${submission.id}-${n}">
            ★
          </span>
        `).join("")}
      </div>
      <button onclick="giveFeedback(${submission.id})">Send Feedback</button>
    </div>
  `).join("");
}

function giveFeedback(id){
  const comment = document.getElementById("fb" + id).value.trim();
  const rating = ratings[id];

  if(!comment){
    alert("Write feedback first");
    return;
  }

  MentorStorage.addFeedback({
    submission_id: id,
    comment,
    score: rating || null
  });

  alert("Feedback sent");
  loadSubmissions();
  loadLeaderboard();
}

function setRating(id, value){
  ratings[id] = value;

  for(let i = 1; i <= 5; i++){
    const star = document.getElementById(`star${id}-${i}`);
    if(star){
      star.classList.toggle("active", i <= value);
    }
  }
}

function loadChart(data){
  let reviewed = 0;
  let pending = 0;
  data.forEach((item) => item.status === "reviewed" ? reviewed++ : pending++);

  if(chart) chart.destroy();
  chart = new Chart(myChart, {
    type:'doughnut',
    data:{
      labels:["Reviewed","Pending"],
      datasets:[{data:[reviewed,pending],backgroundColor:["#22c55e","#f59e0b"]}]
    },
    options:{maintainAspectRatio:false}
  });
}

function loadLine(data){
  const map = {};
  data.forEach((item) => {
    const date = item.created_at ? new Date(item.created_at).toLocaleDateString() : "Unknown";
    map[date] = (map[date] || 0) + 1;
  });

  if(lineChart) lineChart.destroy();
  lineChart = new Chart(document.getElementById("lineChart"), {
    type: 'line',
    data: {
      labels: Object.keys(map),
      datasets: [{
        label: "Submissions",
        data: Object.values(map),
        borderColor: "#38bdf8",
        backgroundColor: "rgba(56,189,248,0.2)",
        fill: true,
        tension: 0.4
      }]
    },
    options:{ responsive:true, maintainAspectRatio:false }
  });
}

function loadBar(data){
  const map = {};
  data.forEach((item) => {
    map[item.challenge_id] = (map[item.challenge_id] || 0) + 1;
  });

  if(barChart) barChart.destroy();
  barChart = new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
      labels: Object.keys(map),
      datasets: [{
        label: "Submissions per Challenge",
        data: Object.values(map),
        backgroundColor: ["#22c55e","#f59e0b","#3b82f6","#ef4444","#a855f7"]
      }]
    },
    options:{ responsive:true, maintainAspectRatio:false }
  });
}

function loadLeaderboard(){
  const data = MentorStorage.getLeaderboard();
  leaderboard.innerHTML = data.map((user, index) => `
    <div class="leader">
      Rank ${index + 1}
      <span>${user.name || user.mentee_id}</span>
      <span>${user.total_submissions}</span>
    </div>
  `).join("") || "<p>No submissions yet</p>";
}

function createChallenge(){
  const currentUser = userData.user;
  const sessionId = document.getElementById("sessionSelect").value;
  const titleInput = document.getElementById("title");
  const descInput = document.getElementById("desc");
  const subjectInput = document.getElementById("subject");
  const difficultyInput = document.getElementById("difficulty");
  const deadlineInput = document.getElementById("deadline");

  if(!sessionId){
    alert("Select a session first");
    return;
  }

  if(!titleInput.value.trim() || !descInput.value.trim()){
    alert("Title and description are required");
    return;
  }

  MentorStorage.addChallenge({
    mentor_id: currentUser.id,
    title: titleInput.value,
    description: descInput.value,
    subject: subjectInput.value,
    difficulty: difficultyInput.value,
    deadline: deadlineInput.value,
    session_id: sessionId
  });

  alert("Challenge created");
  titleInput.value = "";
  descInput.value = "";
  subjectInput.value = "";
  difficultyInput.value = "";
  deadlineInput.value = "";
  loadChallenges();
}

function logout(){
  localStorage.removeItem("user");
  window.location.href = "index.html";
}

window.onload = () => {
  loadSessions();
  loadChallenges();
  loadSubmissions();
  loadLeaderboard();
};
</script>

</body>
</html>
