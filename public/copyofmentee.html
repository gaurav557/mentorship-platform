<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentee Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg:         #07070f;
  --surface:    #0f0e1c;
  --surface2:   #16152a;
  --surface3:   #1e1c35;
  --border:     rgba(255,255,255,0.07);
  --border2:    rgba(255,255,255,0.13);

  --indigo:     #6c63ff;
  --indigo-mid: #8b85ff;
  --indigo-soft:#6c63ff22;
  --teal:       #2de8c8;
  --teal-soft:  #2de8c81a;
  --rose:       #ff6b8a;
  --rose-soft:  #ff6b8a1a;
  --amber:      #ffb347;
  --amber-soft: #ffb3471a;
  --green:      #4ade80;
  --green-soft: #4ade801a;

  --text:       #ececf4;
  --muted:      #7e7b99;
  --faint:      #3a3858;

  --r:          16px;
  --r-sm:       10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── ANIMATED BG ORBS ─── */
.orbs {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.18;
  animation: drift 18s ease-in-out infinite;
}
.orb1 { width: 500px; height: 500px; background: var(--indigo); top: -150px; left: -100px; animation-delay: 0s; }
.orb2 { width: 400px; height: 400px; background: var(--teal);   bottom: -120px; right: -80px; animation-delay: -6s; }
.orb3 { width: 300px; height: 300px; background: var(--rose);   top: 40%; left: 50%; animation-delay: -12s; }

@keyframes drift {
  0%, 100% { transform: translate(0,0) scale(1); }
  33%       { transform: translate(40px,-30px) scale(1.05); }
  66%       { transform: translate(-30px,40px) scale(0.97); }
}

/* ── NAV ─────────────── */
nav {
  position: sticky; top: 0; z-index: 200;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 36px; height: 66px;
  background: rgba(7,7,15,0.8);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
  animation: slideDown 0.5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } }

.nav-brand {
  display: flex; align-items: center; gap: 10px;
  font-family: 'Syne', sans-serif;
  font-size: 17px; font-weight: 800; color: var(--text);
  letter-spacing: -0.5px;
}
.nav-logo {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--indigo), var(--teal));
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}
.nav-right { display: flex; align-items: center; gap: 12px; }

.user-pill {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 12px 5px 5px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 999px;
}
.user-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--indigo), var(--rose));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 12px; font-weight: 700; color: white;
}
.user-name { font-size: 13px; font-weight: 500; color: var(--text); }

.btn-logout {
  padding: 7px 16px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  color: var(--muted);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-logout:hover { color: var(--rose); border-color: var(--rose-soft); background: var(--rose-soft); }

/* ── WELCOME TOAST ───── */
#welcomeToast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
  z-index: 999; padding: 12px 24px;
  background: var(--surface2);
  border: 1px solid var(--indigo);
  border-radius: 999px;
  font-size: 14px; font-weight: 500;
  box-shadow: 0 0 30px rgba(108,99,255,0.25);
  opacity: 0;
  transition: all 0.4s cubic-bezier(.22,1,.36,1);
  pointer-events: none;
  white-space: nowrap;
}
#welcomeToast.show {
  opacity: 1; transform: translateX(-50%) translateY(0);
}

/* ── PAGE ─────────────── */
.page { max-width: 1120px; margin: 0 auto; padding: 36px 24px 80px; position: relative; z-index: 1; }

/* ── HEADER ──────────── */
.page-header {
  margin-bottom: 32px;
  animation: fadeUp 0.6s 0.1s cubic-bezier(.22,1,.36,1) both;
}
.page-header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 30px; font-weight: 800;
  letter-spacing: -0.8px; color: var(--text);
  margin-bottom: 4px;
}
.page-header p { font-size: 14px; color: var(--muted); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── STATS ───────────── */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}

.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  display: flex; align-items: center; gap: 14px;
  transition: transform 0.25s, border-color 0.25s;
  animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) both;
  cursor: default;
}
.stat:nth-child(1) { animation-delay: 0.15s; }
.stat:nth-child(2) { animation-delay: 0.22s; }
.stat:nth-child(3) { animation-delay: 0.29s; }
.stat:nth-child(4) { animation-delay: 0.36s; }
.stat:hover { transform: translateY(-3px); border-color: var(--border2); }

.stat-icon {
  width: 46px; height: 46px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.ic-indigo { background: var(--indigo-soft);  }
.ic-green  { background: var(--green-soft);   }
.ic-rose   { background: var(--rose-soft);    }
.ic-teal   { background: var(--teal-soft);    }

.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 500; margin-bottom: 4px; }
.stat-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -1px; }

/* ── PROGRESS BAR ─────── */
.progress-bar-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px 24px;
  margin-bottom: 24px;
  animation: fadeUp 0.6s 0.4s cubic-bezier(.22,1,.36,1) both;
}
.pb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.pb-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
.pb-pct   { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--teal); }
.pb-track { height: 10px; background: var(--surface3); border-radius: 999px; overflow: hidden; }
.pb-fill  {
  height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, var(--indigo), var(--teal));
  width: 0%;
  transition: width 1.2s cubic-bezier(.22,1,.36,1);
}

/* ── TWO COL GRID ─────── */
.two-col {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

/* ── CARD ─────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 22px 24px;
  animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) both;
}
.card:nth-child(1) { animation-delay: 0.45s; }
.card:nth-child(2) { animation-delay: 0.52s; }

.card-title {
  font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 700; color: var(--text);
  margin-bottom: 18px;
  display: flex; align-items: center; gap: 8px;
}
.ctd { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.ctd-indigo { background: var(--indigo); }
.ctd-teal   { background: var(--teal);   }
.ctd-rose   { background: var(--rose);   }

/* ── CHALLENGE ITEM ───── */
.ch-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 16px;
  margin-bottom: 12px;
  transition: border-color 0.2s, transform 0.2s;
  animation: fadeUp 0.5s cubic-bezier(.22,1,.36,1) both;
}
.ch-item:hover { border-color: rgba(108,99,255,0.35); transform: translateX(3px); }
.ch-item:last-child { margin-bottom: 0; }

.ch-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.ch-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); }
.ch-tag {
  font-size: 10px; font-weight: 600; padding: 3px 9px;
  border-radius: 999px; text-transform: uppercase; letter-spacing: 0.5px;
  background: var(--indigo-soft); color: var(--indigo-mid);
  border: 1px solid rgba(108,99,255,0.25);
}
.ch-desc { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }

.ch-textarea {
  width: 100%; padding: 10px 13px;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text); font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  resize: vertical; min-height: 70px;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.ch-textarea:focus { border-color: var(--indigo); box-shadow: 0 0 0 3px var(--indigo-soft); }

.btn-submit {
  margin-top: 8px; width: 100%;
  padding: 9px;
  background: linear-gradient(135deg, var(--indigo), #9747ff);
  border: none; border-radius: var(--r-sm);
  color: white; font-size: 13px; font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  position: relative; overflow: hidden;
}
.btn-submit::after {
  content: ''; position: absolute; inset: 0;
  background: white; opacity: 0;
  transition: opacity 0.2s;
}
.btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,99,255,0.4); }
.btn-submit:hover::after { opacity: 0.06; }
.btn-submit:active { transform: translateY(0); }

/* ── CHART ─────────────── */
.chart-wrap { height: 210px; position: relative; }

/* ── HISTORY ITEM ─────── */
.h-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 14px 16px;
  margin-bottom: 10px;
  transition: border-color 0.2s;
  animation: fadeUp 0.5s cubic-bezier(.22,1,.36,1) both;
}
.h-item:hover { border-color: var(--border2); }
.h-item:last-child { margin-bottom: 0; }

.h-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.h-challenge { font-size: 13px; font-weight: 600; color: var(--text); }
.h-answer { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }

.badge {
  font-size: 10px; font-weight: 700; padding: 3px 10px;
  border-radius: 999px; text-transform: uppercase; letter-spacing: 0.4px;
}
.b-reviewed { background: var(--green-soft); color: var(--green);  border: 1px solid rgba(74,222,128,0.2); }
.b-pending  { background: var(--amber-soft); color: var(--amber);  border: 1px solid rgba(255,179,71,0.2);  }

.h-feedback {
  font-size: 12px; color: var(--muted); margin-top: 6px;
  padding: 8px 12px;
  background: var(--surface3);
  border-left: 2px solid var(--indigo);
  border-radius: 0 6px 6px 0;
  line-height: 1.5;
}

.stars { color: var(--amber); font-size: 13px; margin-top: 4px; }

/* ── EMPTY ─────────────── */
.empty { text-align: center; padding: 30px; color: var(--faint); font-size: 13px; }

/* ── SPINNER ───────────── */
.spinner {
  width: 28px; height: 28px; margin: 24px auto;
  border: 2px solid var(--surface3);
  border-top-color: var(--indigo);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── SUBMIT SUCCESS FLASH ─ */
@keyframes flashBorder {
  0%   { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-soft); }
  100% { border-color: var(--border); box-shadow: none; }
}
.flash { animation: flashBorder 1s ease-out forwards; }
</style>
</head>
<body>

<div class="orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div id="welcomeToast"></div>

<!-- NAV -->
<nav>
  <div class="nav-brand">
    <div class="nav-logo">&#128218;</div>
    MentorHub
  </div>
  <div class="nav-right">
    <div class="user-pill">
      <div class="user-avatar" id="navInitial">?</div>
      <span class="user-name" id="navName">Loading...</span>
    </div>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>
</nav>

<div class="page">

  <!-- HEADER -->
  <div class="page-header">
    <h1 id="headerGreeting">Hello there &#128075;</h1>
    <p>Track your challenges, submissions, and feedback all in one place.</p>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-icon ic-indigo">&#128196;</div>
      <div>
        <div class="stat-label">Total</div>
        <div class="stat-value" id="totalS">0</div>
      </div>
    </div>
    <div class="stat">
      <div class="stat-icon ic-green">&#9989;</div>
      <div>
        <div class="stat-label">Reviewed</div>
        <div class="stat-value" id="reviewed">0</div>
      </div>
    </div>
    <div class="stat">
      <div class="stat-icon ic-rose">&#9201;</div>
      <div>
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="pending">0</div>
      </div>
    </div>
    <div class="stat">
      <div class="stat-icon ic-teal">&#127959;</div>
      <div>
        <div class="stat-label">Challenges</div>
        <div class="stat-value" id="totalC">0</div>
      </div>
    </div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress-bar-wrap">
    <div class="pb-header">
      <span class="pb-title">Overall Progress</span>
      <span class="pb-pct" id="progressPct">0%</span>
    </div>
    <div class="pb-track">
      <div class="pb-fill" id="progressBar"></div>
    </div>
  </div>

  <!-- MAIN GRID: Challenges + Chart/History -->
  <div class="two-col">

    <!-- CHALLENGES -->
    <div class="card">
      <div class="card-title">
        <span class="ctd ctd-indigo"></span>
        Open challenges
      </div>
      <div id="challenges"><div class="spinner"></div></div>
    </div>

    <!-- RIGHT COLUMN -->
    <div style="display:flex;flex-direction:column;gap:20px;">

      <!-- CHART -->
      <div class="card" style="animation-delay:0.5s">
        <div class="card-title">
          <span class="ctd ctd-teal"></span>
          Your progress
        </div>
        <div class="chart-wrap"><canvas id="myChart"></canvas></div>
      </div>

      <!-- HISTORY -->
      <div class="card" style="animation-delay:0.58s">
        <div class="card-title">
          <span class="ctd ctd-rose"></span>
          Submission history
        </div>
        <div id="history"><div class="spinner"></div></div>
      </div>

    </div>
  </div>

</div>

<script>
const userData = JSON.parse(localStorage.getItem("user"));
if (!userData || userData.user.role !== "mentee") window.location.href = "index.html";
const user = userData.user;

let chartInst;

/* ── INIT UI WITH USER NAME ── */
function initUserUI() {
  const name = user.name || "Mentee";
  const initial = name.charAt(0).toUpperCase();
  document.getElementById("navInitial").textContent = initial;
  document.getElementById("navName").textContent = name;

  const hour = new Date().getHours();
  const greeting = hour < 12 ? "Good morning" : hour < 18 ? "Good afternoon" : "Good evening";
  document.getElementById("headerGreeting").innerHTML =
    `${greeting}, ${name.split(" ")[0]} &#128075;`;

  showToast(`${greeting}, ${name.split(" ")[0]}! Ready to code? &#128640;`);
}

/* ── WELCOME TOAST ── */
function showToast(msg) {
  const t = document.getElementById("welcomeToast");
  t.innerHTML = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3200);
}

/* ── ANIMATE COUNTER ── */
function animateCount(el, target) {
  let start = 0;
  const step = Math.ceil(target / 30);
  const timer = setInterval(() => {
    start = Math.min(start + step, target);
    el.textContent = start;
    if (start >= target) clearInterval(timer);
  }, 30);
}

/* ── LOAD CHALLENGES ── */
function loadChallenges() {
  fetch("http://localhost:5000/api/challenge/all")
    .then(r => r.json())
    .then(data => {
      document.getElementById("totalC").textContent = data.length;
      if (!data.length) {
        document.getElementById("challenges").innerHTML =
          '<div class="empty">No challenges available yet</div>';
        return;
      }
      document.getElementById("challenges").innerHTML = data.map((c, i) => `
        <div class="ch-item" style="animation-delay:${0.05 * i}s">
          <div class="ch-top">
            <div class="ch-title">${c.title}</div>
            <span class="ch-tag">Week ${c.week || i + 1}</span>
          </div>
          <div class="ch-desc">${c.description || "Complete this challenge and submit your solution below."}</div>
          <textarea class="ch-textarea" id="ans${c.id}" placeholder="Write your solution here..."></textarea>
          <button class="btn-submit" onclick="submitAnswer(${c.id}, this)">
            Submit solution &#8594;
          </button>
        </div>
      `).join("");
    }).catch(() => {
      document.getElementById("challenges").innerHTML =
        '<div class="empty">Could not load challenges</div>';
    });
}

/* ── SUBMIT ── */
function submitAnswer(id, btn) {
  const answer = document.getElementById("ans" + id).value.trim();
  if (!answer) { showToast("Please write your solution first &#128221;"); return; }

  btn.textContent = "Submitting...";
  btn.disabled = true;

  fetch("http://localhost:5000/api/submission", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ challenge_id: id, mentee_id: user.id, answer })
  }).then(() => {
    showToast("Solution submitted! &#127881;");
    btn.textContent = "Submitted ✓";
    btn.style.background = "linear-gradient(135deg, #0f6e56, #1d9e75)";
    const item = btn.closest(".ch-item");
    item.classList.add("flash");
    loadHistory();
  }).catch(() => {
    btn.textContent = "Submit solution →";
    btn.disabled = false;
    showToast("Submission failed, please try again &#10060;");
  });
}

/* ── HISTORY ── */
function loadHistory() {
  fetch("http://localhost:5000/api/submission")
    .then(r => r.json())
    .then(data => {
      const mine = data.filter(s => s.mentee_id === user.id || s.mentee_id === String(user.id));
      const total    = mine.length;
      const reviewed = mine.filter(s => s.status === "reviewed").length;
      const pendingN = total - reviewed;

      animateCount(document.getElementById("totalS"), total);
      animateCount(document.getElementById("reviewed"), reviewed);
      animateCount(document.getElementById("pending"), pendingN);

      const pct = total ? Math.round((reviewed / total) * 100) : 0;
      document.getElementById("progressPct").textContent = pct + "%";
      setTimeout(() => {
        document.getElementById("progressBar").style.width = pct + "%";
      }, 200);

      loadChart(reviewed, pendingN);

      if (!mine.length) {
        document.getElementById("history").innerHTML =
          '<div class="empty">No submissions yet — get started above!</div>';
        return;
      }

      document.getElementById("history").innerHTML = mine.map((s, i) => {
        const stars = s.score ? "&#9733;".repeat(Math.round(s.score)) : "";
        return `
          <div class="h-item" style="animation-delay:${0.05 * i}s">
            <div class="h-row">
              <div class="h-challenge">Challenge #${s.challenge_id}</div>
              <span class="badge ${s.status === 'reviewed' ? 'b-reviewed' : 'b-pending'}">
                ${s.status || 'pending'}
              </span>
            </div>
            <div class="h-answer">${s.answer}</div>
            ${s.comment ? `<div class="h-feedback">&#128172; ${s.comment}</div>` : ""}
            ${stars ? `<div class="stars">${stars}</div>` : ""}
          </div>
        `;
      }).join("");
    }).catch(() => {
      document.getElementById("history").innerHTML = '<div class="empty">Could not load history</div>';
    });
}

/* ── CHART ── */
function loadChart(r, p) {
  if (chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById("myChart"), {
    type: "doughnut",
    data: {
      labels: ["Reviewed", "Pending"],
      datasets: [{
        data: [r || 0, p || 0],
        backgroundColor: ["#2de8c8", "#ff6b8a"],
        borderColor: ["#16152a"],
        borderWidth: 3,
        hoverOffset: 8
      }]
    },
    options: {
      cutout: "70%",
      animation: { animateRotate: true, duration: 1000 },
      plugins: {
        legend: {
          position: "bottom",
          labels: {
            color: "#7e7b99",
            font: { family: "DM Sans", size: 12 },
            padding: 16,
            usePointStyle: true,
            pointStyleWidth: 8
          }
        }
      }
    }
  });
}

/* ── LOGOUT ── */
function logout() {
  localStorage.removeItem("user");
  window.location.href = "index.html";
}

/* ── START ── */
window.onload = () => {
  initUserUI();
  loadChallenges();
  loadHistory();
};
