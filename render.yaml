databases:
  - name: mentor-mentee-db
    plan: free
    databaseName: mentor_platform

services:
  - type: web
    name: mentor-mentee-platform
    runtime: node
    plan: free
    buildCommand: npm install
    preDeployCommand: npm run db:init
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mentor-mentee-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
